<div class="ion-page">
<ion-content [fullscreen]="true">
  <div class=" w-full min-h-[100vh] flex items-center justify-center px-5">
  <div class="">
    <div class=" fixed top-2 left-2">
      <ion-buttons slot="start">
        <ion-back-button defaultHref="/splash" class="bb" ></ion-back-button>
      </ion-buttons>
    </div>
  </div>


  <div class=" w-full flex flex-col gap-8">
    <div class="flex flex-col gap-2  w-full flex items-center">
      <div class="bg-blue-700 w-16 h-16 rounded-full flex items-center justify-center ">

<lucide-icon [img]="store" class="text-white"></lucide-icon>
      </div>

      <h1 class="text-[20px] font-bold">Seller Login</h1>
       <p class="text-gray-500 dark:text-gray-300  text-[13px]">Please enter your details to login</p>
    
    </div>

            <form action="" class="w-full items-center  justify-center flex flex-col mt-1  pb-2 gap-2 ">
              <div class="gap-2 flex flex-col mb-1 w-full">
                <label for="" class="text-[13px]">Email</label>
                <input type="text" name="email" autocomplete="email"
                  class="outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-100"
                  placeholder="Enter email" />
              </div>
              <div class="gap-2 flex flex-col mb-1 w-full">
                <label for="" class="text-[13px]">Password</label>
                <input type="password" name="password"
                  class="outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-100"
                  placeholder="Enter password">
              </div>
              <p class="text-right py-2 w-full text-right text-gray-500 dark:text-gray-300 cursor-pointer text-[13px]">
                <a href="" class="">Forgot password?</a>
              </p>
              <button type="submit"
                class="bg-blue-700 rounded-md cursor-pointer text-[15px]  h-11  text-white mt-2 w-full disabled:bg-blue-300 flex items-center justify-center " (click)="goToSeller()">
                Login

              </button>

            </form>

  </div>
</div>

</ion-content>
</div>
