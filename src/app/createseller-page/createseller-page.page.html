<ion-header>

  <div class="bg-purple-700 w-full  flex   sticky left-0 py-7 px-5 top-0 right-0 z-50 shadow-xl">
    <div class=" fixed top-2 left-2 z-50">
      <ion-buttons slot="start">
        <ion-back-button defaultHref="admin-tabs" class="bb"></ion-back-button>
      </ion-buttons>
    </div>
    <div class="pt-8  gap-7  justify-center flex flex-col  w-full h-full   ">
      <div class=" gap-1 flex flex-col">
        <h1 class="text-[25px] font-semibold text-white">
          Create Seller Account
        </h1>
        <p class="text-gray-100 text-[14px]">
          Add a new seller to the platform
        </p>
      </div>


    </div>



  </div>
</ion-header>

<ion-content [fullscreen]="true" class="whole">
  <div class="p-4 flex flex-col gap-4">

    <div class="bg-white w-full  rounded-md p-4 flex flex-col gap-2 border shadow-md">
      <p class="text-[13px]">Profile Photo (Optional)</p>
      <div class="flex gap-5 items-center ">
        <div class="bg-purple-100 rounded-full flex justify-center items-center size-20">
          <lucide-icon [img]="user" class="w-8 h-8 text-purple-700">

          </lucide-icon>
        </div>
        <button class=" flex bg-purple-100 h-fit p-2 rounded-md gap-2 ">
          <ion-icon name="camera-outline" class="text-purple-700">

          </ion-icon>
          <span class="text-purple-700 text-[12px]">Upload Photo</span>
        </button>
      </div>
    </div>


    <div class="w-full bg-white  rounded-md border shadow-md p-3 flex flex-col gap-2">
      <p>Personal Information</p>

      <form action="" class="w-full items-center  justify-center flex flex-col mt-1  pb-2 gap-2 ">
        <div class="gap-2 flex flex-col mb-1 w-full">
          <label for="" class="text-[13px]">Full Name</label>
          <input type="text" name="fullname" autocomplete="fullname"
            class=" placeholder:text-[13px] outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-100"
            placeholder="Enter seller fullname" />
        </div>
        <div class="gap-2 flex flex-col mb-1 w-full">
          <label for="" class="text-[13px]">Farm / Business Name</label>
          <input type="text" name="text"
            class=" placeholder:text-[13px] outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-100"
            placeholder="Enter farm or business name">
        </div>



      </form>


    </div>


    <div class="w-full  bg-white   rounded-md border shadow-md p-3 flex flex-col gap-2">
      <p>Contact Information</p>

      <form action="" class="w-full items-center  justify-center flex flex-col mt-1  pb-2 gap-2 ">
        <div class="gap-2 flex flex-col mb-1 w-full">
          <label for="" class="text-[13px]">Email Address</label>
          <input type="email" name="email" 
            class="  placeholder:text-[13px] outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-50"
            placeholder="seller@gmail.com" />
        </div>
        <div class="gap-2 flex flex-col mb-1 w-full">
          <label for="" class="text-[13px]">Phone Number</label>
          <input type="number" name="number"
            class=" placeholder:text-[13px] outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-50"
            placeholder="+234 322 459 3245">
        </div>



      </form>


    </div>
        <div class="w-full  bg-white   rounded-md border shadow-md p-3 flex flex-col gap-2">
      <p>Location Information</p>

      <form action="" class="w-full items-center  justify-center flex flex-col mt-1  pb-2 gap-2 ">
        <div class="gap-2 flex flex-col mb-1 w-full">
          <label for="" class="text-[13px]">State</label>
          <input type="email" name="email" autocomplete="email"
            class="  placeholder:text-[13px] outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-50"
            placeholder="seller@gmail.com" />
        </div>
        <div class="gap-2 flex flex-col mb-1 w-full">
          <label for="" class="text-[13px]">City / Town</label>
          <input type="number" name="number"
            class="  placeholder:text-[13px] outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-50"
            placeholder="+234 322 459 3245">
        </div>



      </form>


    </div>
        <div class="w-full   bg-white  rounded-md border shadow-md p-3 flex flex-col gap-2">
      <p>Account Security</p>

      <form action="" class="w-full items-center  justify-center flex flex-col mt-1  pb-2 gap-2 ">
        <div class="gap-2 flex flex-col mb-1 w-full">
          <label for="" class="text-[13px]">Password</label>
          <input type="password" name="password" 
            class=" placeholder:text-[13px] outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-50"
            placeholder="Enter Password" />
        </div>
        <div class="gap-2 flex flex-col mb-1 w-full">
          <label for="" class="text-[13px]">Confirm Password</label>
          <input type="password" name="cpassword"
            class="  placeholder:text-[13px] outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-10 bg-gray-50"
            placeholder="Confirm Password">
        </div>



      </form>


    </div>

    <button class="bg-purple-700 w-full text-[15px] text-white rounded-md   h-12 flex items-center justify-center" (click)="showToast('Seller Account Created')">
Create seller Account
    </button>
  </div>

</ion-content>
