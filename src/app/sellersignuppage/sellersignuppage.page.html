<p class="text-gray-600 dark:text-gray-300 text-center text-[13px]">Create An Account!</p>

         

            <form action=""
              class="w-full items-center  justify-center flex flex-col mt-1 gap-2 pb-5 overflow-y-scroll ">
              <div class="gap-2 flex flex-col mb-1 w-full">
                <label for="" class="text-[13px]">Full Name</label>
                <input type="text" name="fullname" autocomplete="fullname"
                  class="outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-100"
                  placeholder="Enter fullname" />
              </div>
              <div class="gap-2 flex flex-col mb-1 w-full">
                <label for="" class="text-[13px]">Email</label>
                <input type="text" name="email" autocomplete="email"
                  class="outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-100"
                  placeholder="Enter email" />
              </div>
              <div class="gap-2 flex flex-col mb-1 w-full">
                <label for="" class="text-[13px]">Password</label>
                <input type="password" name="password" autocomplete="password"
                  class="outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-100"
                  placeholder="Enter password" />
              </div>
              <div class="gap-2 flex flex-col mb-1 w-full">
                <label for="" class="text-[13px]"> Confirm Password</label>
                <input type="password" name="Confirm password" autocomplete="password"
                  class="outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-100"
                  placeholder="Confirm password" />
              </div>
         
              <div class="flex w-full items-center  gap-1 my-1 px-1 ">
                <ion-checkbox class=""></ion-checkbox>
                <p class="text-[13px] ">
                  I agree with <span class="underline text-blue-400  "> <a href="">Terms and Conditions</a> </span>
                </p>
              </div>

              <button type="submit"
                class="btn-big cursor-pointer text-[15px]  h-11 rounded-full text-white mt-2 w-full disabled:bg-blue-300 flex items-center justify-center "
                (click)="goToVerifyemail()">
                Create Account

              </button>

            </form>
