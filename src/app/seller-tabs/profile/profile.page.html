      <div class=" w-full flex flex-col gap-3  bg-white py-4 px-2 border border-gray-300 rounded-md ">
        <div class="flex justify-between items-center ">
          <span class="font-semibold text-[16px]">Apperances </span>

        </div>



        <ion-list>
          <ion-item lines="none">
            <div class=" flex  w-full gap-2 ">
              <div class=" h-full">
                <ion-icon name="sunny-outline" class="text-black w-6 h-6"></ion-icon>
              </div>
              <div class="w-full flex items-center justify-between">
                <div>
                  <h2 class="text-[13px] font-semibold text-black">Dark Theme</h2>
                  <p class="text-[12px] text-gray-500">Change to dark theme</p>
                </div>
                <div class=" h-6 ">
                  <ion-toggle [checked]="false" class="toggle"></ion-toggle>
                </div>
              </div>

            </div>
          </ion-item>
        </ion-list>


      </div>
      <div class=" w-full flex flex-col gap-3  bg-white py-4 px-1 border border-gray-300 rounded-md ">
        <div class="flex justify-between items-center px-3 ">
          <span class="font-semibold text-[16px]">Account </span>

        </div>



        <ion-list>
          <ion-item>
            <div class=" flex  w-full gap-2 py-5 items-center ">
              <div class=" h-full flex items-center justify-center">
                <ion-icon name="notifications-outline" class=" w-5 h-5">

                </ion-icon>
              </div>
              <div class="w-full flex items-center justify-between">
                <div>
                  <h2 class="text-[13px] text-black">Notification</h2>
                </div>
                <div class=" h-6 ">
                  <ion-toggle [checked]="false" class="toggle"></ion-toggle>

                </div>
              </div>

            </div>
          </ion-item>
          <ion-item button="true" lines="none">
            <div class=" flex  w-full gap-2 py-5">
              <div class=" h-full flex items-center justify-center">
                <ion-icon name="pin-outline" class="w-5 h-5"></ion-icon>
              </div>
              <div class="w-full flex items-center justify-between">
                <div>
                  <h2 class="text-[13px]  text-black">Location</h2>
                </div>
                <div class=" h-6 ">
                </div>
              </div>

            </div>
          </ion-item>
      
        </ion-list>


      </div>



      <div class=" w-full flex flex-col gap-3  bg-white py-4 px-1 border border-gray-300 rounded-md ">
        <div class="flex justify-between items-center px-3 ">
          <span class="font-semibold text-[16px]">Seller Settings </span>

        </div>



        <ion-list>
          <ion-item button="true" lines="none">
            <div class=" flex  w-full gap-2 py-5 ">
              <div class=" h-full flex items-center justify-center">
                <lucide-icon [img]="shopping" class=" w-5 h-5"></lucide-icon>
              </div>
              <div class="w-full flex items-center justify-between">
                <div>
                  <h2 class="text-[13px]  text-black">Order History</h2>
                </div>
                <div class=" h-6 ">
                </div>
              </div>

            </div>
          </ion-item>
      
        </ion-list>


      </div>

      <div class=" w-full flex flex-col gap-3  bg-white py-4 px-1 border border-gray-300 rounded-md ">

        </div>



        <ion-list>
          <ion-item button="true">
            <div class=" flex  w-full gap-2 py-5 ">
              <div class=" h-full flex items-center justify-center">
                <ion-icon name="help-circle-outline" class="w-6 h-6 text-black"></ion-icon>
              </div>
              <div class="w-full flex items-center justify-between">
                <div>
                  <h2 class="text-[13px]  text-black">Help Center</h2>
                </div>
                <div class=" h-6 ">
                </div>
              </div>

            </div>
          </ion-item>
          <ion-item button="true" lines="none">

                <lucide-icon [img]="shield"></lucide-icon>
              </div>
              <div class="w-full flex items-center justify-between">
                <div>
                  <h2 class="text-[13px]  text-black">Privacy Policy</h2>
                </div>
                <div class=" h-6 ">
                </div>
              </div>

            </div>
          </ion-item>

        </ion-list>

      <div
