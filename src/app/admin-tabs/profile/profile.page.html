<ion-content>

  <div
    class="w-full min-h-[100vh]  bg-gray-50 dark:bg-gray-900 flex flex-col gap-6 overflow-y-auto transition-colors duration-300">





 

<div class=" fixed top-2 left-2 z-50">
      <ion-buttons slot="start">
        <ion-back-button defaultHref="admin-tabs/dashboard" class="bb"></ion-back-button>
      </ion-buttons>
    </div>



    <div class="overflow-hidden    border border-gray-300 dark:border-gray-700 shadow-sm">
      <div class="bg-purple-700 h-28 w-full relative flex pl-6">
        <div class="fixed z-30 mt-2 -ml-2">
          <!-- <lucide-icon [img]="arrb" class="text-white" (click)="goBack()"></lucide-icon> -->
        </div>

        <div class="rounded-full h-24 w-24 absolute -bottom-10">
          <div class="w-full h-full rounded-full overflow-hidden bg-gray-200 dark:bg-gray-700 border-4 border-white">
            <!-- <img [src]="this.dataService.group().image" alt=""> -->
            <!-- }@else{ -->
            <div
              class="bg-gray-200 dark:bg-gray-700 w-full h-full flex items-center justify-center font-semibold text-3xl text-gray-800 dark:text-gray-200">
              <!-- {{ this.dataService.getInitials(this.dataService.group()?.username) }} -->
            </div>
            <!-- } -->
          </div>

          <div
            class="bg-[var(--theme-color)] h-7 w-7 p-2 rounded-full absolute bottom-1 -right-3 flex items-center justify-center">
            <!-- <lucide-icon [img]="camera" class="text-white w-4"></lucide-icon> -->
          </div>
        </div>
      </div>

      <div class="pt-12 px-5 pb-8 flex flex-col gap-3 bg-white dark:bg-gray-800 transition-colors duration-300">
        <div class="flex flex-col gap-1">
          <h1 class="font-semibold text-[16px] text-gray-900 dark:text-gray-100 ">Omoniyi Tomiwa</h1>
          <p class="text-[12px] text-gray-500">admin@gmail.com </p>
        




        </div>

     
      </div>
    </div>

    <div class=" px-4 flex flex-col gap-4 pb-8">
      <!-- Stats Grid -->




      <div class=" w-full flex flex-col gap-3 shadow-md  bg-white py-4 px-2 border border-gray-300 rounded-md ">
        <div class="flex justify-between items-center ">
          <span class="font-semibold text-[16px]">Apperances </span>

        </div>



        <ion-list>
          <ion-item lines="none">
            <div class=" flex  w-full gap-2 ">
              <div class=" h-full">
                <ion-icon name="sunny-outline" class="text-black w-6 h-6"></ion-icon>
              </div>
              <div class="w-full flex items-center justify-between">
                <div>
                  <h2 class="text-[13px] font-semibold text-black">Dark Theme</h2>
                  <p class="text-[12px] text-gray-500">Change to dark theme</p>
                </div>
                <div class=" h-6 ">
                  <ion-toggle [checked]="false" class="toggle"></ion-toggle>
                </div>
              </div>

            </div>
          </ion-item>
        </ion-list>


      </div>
      <div class=" w-full shadow-md flex flex-col gap-3  bg-white py-4 px-1 border border-gray-300 rounded-md ">
        <div class="flex justify-between items-center px-3  ">
          <span class="font-semibold text-[16px]">Account Settings </span>

        </div>



        <ion-list>
          <ion-item lines="none" >
            <div class=" flex  w-full gap-2 py-5 items-center ">
              <div class=" h-full flex items-center justify-center">
                <ion-icon name="notifications-outline" class=" w-5 h-5">

                </ion-icon>
              </div>
              <div class="w-full flex items-center justify-between">
                <div>
                  <h2 class="text-[13px] text-black">Notification</h2>
                </div>
                <div class=" h-6 ">
                  <ion-toggle [checked]="false" class="toggle"></ion-toggle>

                </div>
              </div>

            </div>
          </ion-item>
          <!-- <ion-item button="true" lines="none">
            <div class=" flex  w-full gap-2 py-5 ">
              <div class=" h-full flex items-center justify-center">
                <lucide-icon [img]="user" class=" w-5 h-5"></lucide-icon>
              </div>
              <div class="w-full flex items-center justify-between">
                <div>
                  <h2 class="text-[13px]  text-black">Profile Information</h2>
                </div>
                <div class=" h-6 ">
                </div>
              </div>

            </div>
          </ion-item> -->

        </ion-list>


      </div>



      <div class=" w-full flex flex-col gap-3 shadow-md bg-white py-4 px-1 border border-gray-300 rounded-md ">
        <div class="flex justify-between items-center px-3 ">
          <span class="font-semibold text-[16px]">Support & Legal</span>

        </div>



        <ion-list>
          <ion-item button="true">
            <div class=" flex  w-full gap-2 py-5 ">
              <div class=" h-full flex items-center justify-center">
                <ion-icon name="help-circle-outline" class="w-6 h-6 text-black"></ion-icon>
              </div>
              <div class="w-full flex items-center justify-between">
                <div>
                  <h2 class="text-[13px]  text-black">Help Center</h2>
                </div>
                <div class=" h-6 ">
                </div>
              </div>

            </div>
          </ion-item>
          <ion-item button="true" lines="none">
            <div class=" flex  w-full gap-2 py-5">
              <div class=" h-full">
                <lucide-icon [img]="shield"></lucide-icon>
              </div>
              <div class="w-full flex items-center justify-between">
                <div>
                  <h2 class="text-[13px]  text-black">Privacy Policy</h2>
                </div>
                <div class=" h-6 ">
                </div>
              </div>

            </div>
          </ion-item>

        </ion-list>


      </div>


      <div
        class=" w-full rounded-md bg-red-50 border text-[15px] border-red-200 gap-2 p-4 h-11 flex items-center justify-center text-red-500" (click)="this.alertService.presentlogOutAlert()">
        <lucide-icon [img]="logout" class="w-5 h-5"></lucide-icon>
        <span>Logout </span>
      </div>
    </div>
    <!-- Settings / Actions -->
  </div>




</ion-content>
