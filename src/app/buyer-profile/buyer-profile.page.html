<div class="ion-page">

<ion-header>
  <div class="btn w-full py-3 flex px-3 sticky left-0 top-0 right-0 z-50 shadow-xl">
     <div class=" fixed top-2 left-2 z-50">
      <ion-buttons slot="start">
        <ion-back-button defaultHref="tabs/tab4" class="bb"></ion-back-button>
      </ion-buttons>
    </div>

    <div class="pt-10  gap-7  justify-center flex flex-col  w-full h-full   ">
      <div class=" gap-1 flex flex-col">
        <h1 class="text-2xl font-semibold text-white">
          Profile
        </h1>

      </div>

    </div>



  </div>
</ion-header>

<ion-content >
  <div class=" p-4 flex flex-col gap-4">

    <div class="bg-white w-full  rounded-md p-4 flex flex-col gap-2 border shadow-md">
      <p class="text-[13px]">Profile Photo (Optional)</p>
      <div class="flex gap-5 items-center ">
        <div class="bg-green-100 rounded-full flex justify-center items-center size-20">
          <lucide-icon [img]="user" class="w-8 h-8 text-green-700">
  
          </lucide-icon>
        </div>
        <button class=" flex bg-green-100 h-fit p-2 rounded-md gap-2 ">
          <ion-icon name="camera-outline" class="text-green-700">
  
          </ion-icon>
          <span class="text-green-700 text-[12px]">Upload Photo</span>
        </button>
      </div>
    </div>

    
    <div class="w-full bg-white  rounded-md border shadow-md p-3 flex flex-col gap-2">
      <p>Personal Information</p>

      <form action="" class="w-full items-center  justify-center flex flex-col mt-1  pb-2 gap-2 ">
        <div class="gap-2 flex flex-col mb-1 w-full">
          <label for="" class="text-[13px]">Full Name</label>
          <input type="text" name="fullname" autocomplete="fullname"
            class=" placeholder:text-[13px] outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-100"
            placeholder="Enter your fullname" />
        </div>
        <div class="gap-2 flex flex-col mb-1 w-full">
          <label for="" class="text-[13px]">Email</label>
          <input type="email" name="text"
            class=" placeholder:text-[13px] outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-100"
            placeholder="Enter your email address">
        </div>



      </form>


    </div>

      <div class="w-full bg-white  rounded-md border shadow-md p-3 flex flex-col gap-2">

      <form action="" class="w-full items-center  justify-center flex flex-col mt-1  pb-2 gap-2 ">
        <div class="gap-2 flex flex-col mb-1 w-full">
          <label for="" class="text-[13px]">Delivery Address</label>
          <input type="text" name="fullname" autocomplete="fullname"
            class=" placeholder:text-[13px] outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-100"
            placeholder="Enter delivery address" />
        </div>
        <div class="gap-2 flex flex-col mb-1 w-full">
          <label for="" class="text-[13px]">Phone Number</label>
          <input type="number" name="number"
            class=" placeholder:text-[13px] outline-none  h-11 rounded-md w-full border border-gray-300 pl-2 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 bg-gray-100"
            placeholder="Enter Phone Number">
        </div>



      </form>


    </div>

    
    <button class="bg-green-700 w-full text-[12px] text-white rounded-md   h-11 flex items-center justify-center" (click)="this.presentToast('Profile Edited')">
Edit Profile
    </button>
  </div>


  <div class="border-t border-gray-300 dark:border-gray-700 mt-5 mb-5 pt-6 text-center">
      <p class="text-sm text-gray-600 dark:text-gray-400">
        © 2026 AAUAmart. All rights reserved.
      </p>
    </div>

</ion-content>

</div>
