                                </div>
                            </div>
                            <div class=" ss swiper-slide  rounded-xl overflow-hidden">
                                <div class=" ss  bg-3 w-full h-full bg-white p-3">
                                    <span
                                        class="text-[15px] font-semibold text-white bg-black/30 backdrop-blur-md  p-2 rounded-md ">Easy
                                        & Secure Payment</span>



                                </div>
                            </div>

                                <div class=" ss  bg-5 w-full h-full bg-white p-3">
                                    <span

                                        of Products</span>



                                </div>

                        <div class="swiper-pagination"></div>

                        <!-- If we need navigation buttons -->
                        >n

                        <!-- If we need scrollbar -->

                    </div>

                </div>


                <div>

                </div>
                <div class="flex gap-3  py-2 px-4 ">
                    @for (cat of categories; track cat.id) {
                    <button type="button" (click)="selectCategory(cat.id)"
                        class="flex-1 flex flex-col items-center justify-center rounded-2xl py-3 transition-all duration-200"
                        [class.bg-green-600]="activeCategory === cat.id" [class.text-white]="activeCategory === cat.id"
                        [class.bg-gray-200]="activeCategory !== cat.id">
                        <ion-icon [name]="cat.icon" class="text-2xl mb-1"></ion-icon>

                        <span class="text-[14px] font-medium">
                            {{ cat.label }}
                        </span>
                    </button>
                    }
                </div>


                <div class="mt-4 px-4 ">
                    @switch (activeCategory) {

                    @case ('agric') {
                    <section class="animate-fade-in  w-full h-full">

                        <app-farmproduce></app-farmproduce>
                    </section>
                    }

                    @case ('livestock') {
                    <section class="animate-fade-in">
                        <app-livestocks></app-livestocks>
                    </section>
                    }

                    @case ('clothes') {
                    <section class="animate-fade-in">

                        <app-clothes>

                        </app-clothes>
                    </section>
                    }

                    }
                </div>



            </div>
        </div>
